server:
  port: 8084

spring:
  application:
    name: payment-service
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${PAYMENT_DB_USER:root}
    password: ${PAYMENT_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  security:
    jwt:
      secret: ${JWT_SECRET:kNf3s6Z1kF0Jq9wzXx+q0nA2p8bLzRkF4CkY0e6A9kM=}
  payment:
    default-provider: ${PAYMENT_DEFAULT_PROVIDER:DUMMY}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  clients:
    order-service:
      base-url: ${ORDER_SERVICE_URL:http://localhost:8083}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

