server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${AUTH_DB_USER:root}
    password: ${AUTH_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  security:
    jwt:
      # For demo convenience only. In real deployments, ALWAYS set via env.
      secret: ${JWT_SECRET:change-me-super-secret-demo-key-change-me}
      issuer: ${JWT_ISSUER:ecommerce-demo}
      access-token-ttl-minutes: ${JWT_TTL_MINUTES:120}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

